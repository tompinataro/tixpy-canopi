<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Tixpy Canopi Master Logo</title>
  <desc id="desc">Classical logo with burgundy canopy, Roman columns, and two-line Tixpy Canopi text.</desc>
  <defs>
    <linearGradient id="canopyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a10f34" />
      <stop offset="100%" stop-color="#8a1030" />
    </linearGradient>
    <linearGradient id="columnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#efe3d5" />
      <stop offset="50%" stop-color="#f7ede2" />
      <stop offset="100%" stop-color="#e8dac9" />
    </linearGradient>
    <linearGradient id="columnShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8eee2" />
      <stop offset="100%" stop-color="#e4d4c0" />
    </linearGradient>
    <style>
      .bg-rect { fill: #f2e7df; }
      .full-variant { display: inline; }
      .icon-variant { display: none; }
      .favicon-variant { display: none; }
      .canopy-main { fill: url(#canopyGrad); }
      .canopy-trim { fill: #9a1233; }
      .column-body { fill: url(#columnGrad); }
      .column-accent { fill: #f9f1e8; }
      .column-shadow { fill: url(#columnShadow); opacity: 0.92; }
      .logo-text {
        fill: #7f1734;
        font-family: "Monotype Corsiva", "Apple Chancery", "Snell Roundhand", "URW Chancery L", "Times New Roman", serif;
        font-style: italic;
        font-weight: 500;
      }
      .initials-text {
        fill: #7f1734;
        font-family: "Monotype Corsiva", "Apple Chancery", "Snell Roundhand", "URW Chancery L", "Times New Roman", serif;
        font-style: italic;
        font-weight: 600;
      }
      .favicon-initials {
        fill: #7f1734;
        font-family: "Times New Roman", "Georgia", serif;
        font-weight: 700;
        letter-spacing: 10px;
      }
    </style>
  </defs>

  <rect id="bg" class="bg-rect" x="0" y="0" width="1400" height="1000" />

  <g id="full-logo" class="full-variant" transform="translate(0, 0)">
    <g id="canopy" transform="translate(0, 0)">
      <path class="canopy-main" d="M315 130 H1085 C1118 179 1176 221 1268 250 H1320 V250 H80 V250 H132 C224 221 282 179 315 130 Z" />
      <rect class="canopy-main" x="80" y="250" width="1240" height="62" />
      <circle class="canopy-trim" cx="160" cy="312" r="72" />
      <circle class="canopy-trim" cx="360" cy="312" r="72" />
      <circle class="canopy-trim" cx="560" cy="312" r="72" />
      <circle class="canopy-trim" cx="760" cy="312" r="72" />
      <circle class="canopy-trim" cx="960" cy="312" r="72" />
      <circle class="canopy-trim" cx="1160" cy="312" r="72" />
    </g>

    <g id="left-column" transform="translate(145, 352)">
      <rect class="column-shadow" x="-8" y="456" width="150" height="42" rx="8" />
      <rect class="column-body" x="0" y="18" width="128" height="450" rx="14" />
      <rect class="column-accent" x="18" y="38" width="92" height="398" rx="10" />
      <rect class="column-body" x="-16" y="0" width="160" height="30" rx="10" />
      <rect class="column-body" x="-26" y="-28" width="180" height="32" rx="12" />
      <rect class="column-body" x="-28" y="468" width="184" height="34" rx="10" />
      <rect class="column-body" x="-12" y="502" width="152" height="26" rx="8" />
      <path class="column-body" d="M-32 -14 C-44 -18 -48 -34 -38 -42 C-28 -50 -10 -38 -10 -20 C-10 -6 -20 0 -32 -14 Z" />
      <path class="column-body" d="M160 -14 C172 -18 176 -34 166 -42 C156 -50 138 -38 138 -20 C138 -6 148 0 160 -14 Z" />
      <g fill="#e5d6c5">
        <rect x="16" y="44" width="8" height="386" rx="4" />
        <rect x="34" y="44" width="8" height="386" rx="4" />
        <rect x="52" y="44" width="8" height="386" rx="4" />
        <rect x="70" y="44" width="8" height="386" rx="4" />
        <rect x="88" y="44" width="8" height="386" rx="4" />
      </g>
    </g>

    <g id="right-column" transform="translate(1127, 352)">
      <rect class="column-shadow" x="-8" y="456" width="150" height="42" rx="8" />
      <rect class="column-body" x="0" y="18" width="128" height="450" rx="14" />
      <rect class="column-accent" x="18" y="38" width="92" height="398" rx="10" />
      <rect class="column-body" x="-16" y="0" width="160" height="30" rx="10" />
      <rect class="column-body" x="-26" y="-28" width="180" height="32" rx="12" />
      <rect class="column-body" x="-28" y="468" width="184" height="34" rx="10" />
      <rect class="column-body" x="-12" y="502" width="152" height="26" rx="8" />
      <path class="column-body" d="M-32 -14 C-44 -18 -48 -34 -38 -42 C-28 -50 -10 -38 -10 -20 C-10 -6 -20 0 -32 -14 Z" />
      <path class="column-body" d="M160 -14 C172 -18 176 -34 166 -42 C156 -50 138 -38 138 -20 C138 -6 148 0 160 -14 Z" />
      <g fill="#e5d6c5">
        <rect x="16" y="44" width="8" height="386" rx="4" />
        <rect x="34" y="44" width="8" height="386" rx="4" />
        <rect x="52" y="44" width="8" height="386" rx="4" />
        <rect x="70" y="44" width="8" height="386" rx="4" />
        <rect x="88" y="44" width="8" height="386" rx="4" />
      </g>
    </g>

    <g id="text" text-anchor="middle">
      <text class="logo-text" x="700" y="515" font-size="150" letter-spacing="1.2">Tixpy</text>
      <text class="logo-text" x="700" y="690" font-size="150" letter-spacing="1.1">Canopi</text>
    </g>
  </g>

  <g id="icon-mark" class="icon-variant" transform="translate(188, 116)">
    <g transform="scale(0.74)">
      <path class="canopy-main" d="M315 130 H1085 C1118 179 1176 221 1268 250 H1320 V250 H80 V250 H132 C224 221 282 179 315 130 Z" />
      <rect class="canopy-main" x="80" y="250" width="1240" height="62" />
      <circle class="canopy-trim" cx="185" cy="312" r="66" />
      <circle class="canopy-trim" cx="390" cy="312" r="66" />
      <circle class="canopy-trim" cx="595" cy="312" r="66" />
      <circle class="canopy-trim" cx="800" cy="312" r="66" />
      <circle class="canopy-trim" cx="1005" cy="312" r="66" />
      <circle class="canopy-trim" cx="1210" cy="312" r="66" />
    </g>

    <g transform="translate(48, 278) scale(0.85)">
      <rect class="column-body" x="0" y="12" width="100" height="390" rx="12" />
      <rect class="column-accent" x="16" y="26" width="68" height="345" rx="10" />
      <rect class="column-body" x="-10" y="-10" width="120" height="30" rx="8" />
      <rect class="column-body" x="-14" y="402" width="128" height="28" rx="8" />
      <g fill="#e5d6c5">
        <rect x="18" y="30" width="7" height="330" rx="3" />
        <rect x="34" y="30" width="7" height="330" rx="3" />
        <rect x="50" y="30" width="7" height="330" rx="3" />
        <rect x="66" y="30" width="7" height="330" rx="3" />
      </g>
    </g>

    <g transform="translate(1028, 278) scale(0.85)">
      <rect class="column-body" x="0" y="12" width="100" height="390" rx="12" />
      <rect class="column-accent" x="16" y="26" width="68" height="345" rx="10" />
      <rect class="column-body" x="-10" y="-10" width="120" height="30" rx="8" />
      <rect class="column-body" x="-14" y="402" width="128" height="28" rx="8" />
      <g fill="#e5d6c5">
        <rect x="18" y="30" width="7" height="330" rx="3" />
        <rect x="34" y="30" width="7" height="330" rx="3" />
        <rect x="50" y="30" width="7" height="330" rx="3" />
        <rect x="66" y="30" width="7" height="330" rx="3" />
      </g>
    </g>

    <g text-anchor="middle">
      <text class="initials-text" x="510" y="652" font-size="380" letter-spacing="8">TC</text>
    </g>
  </g>

  <g id="favicon-mark" class="favicon-variant" transform="translate(75, 115)">
    <g transform="scale(0.95)">
      <path class="canopy-main" d="M315 130 H1085 C1118 179 1176 221 1268 250 H1320 V250 H80 V250 H132 C224 221 282 179 315 130 Z" />
      <rect class="canopy-main" x="80" y="250" width="1240" height="68" />
      <circle class="canopy-trim" cx="170" cy="318" r="76" />
      <circle class="canopy-trim" cx="375" cy="318" r="76" />
      <circle class="canopy-trim" cx="580" cy="318" r="76" />
      <circle class="canopy-trim" cx="785" cy="318" r="76" />
      <circle class="canopy-trim" cx="990" cy="318" r="76" />
      <circle class="canopy-trim" cx="1195" cy="318" r="76" />
    </g>
    <text class="favicon-initials" x="625" y="760" text-anchor="middle" font-size="500">TC</text>
  </g>
</svg>
